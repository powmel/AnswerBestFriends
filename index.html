<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AnswerBestFriends | Hick's Law Experiment</title>
  <link rel="stylesheet" href="styles.css?v=claude_fix_1">
</head>
<body>
  <main class="app-shell">
    <section id="start-screen" class="card screen active">
      <p class="eyebrow">HCI Experiment</p>
      <h1>AnswerBestFriends</h1>
      <p class="lead" data-i18n="startLead">ヒックの法則に基づく選択実験です。</p>
      <label for="language-select">Language / 言語</label>
      <select id="language-select">
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
      <label for="participant-id" data-i18n="participantId">お名前・ニックネーム・合言葉があれば入力してください（任意）</label>
      <input id="participant-id" type="text" autocomplete="off">
      <p class="help-text" data-i18n="startHelper">匿名でも参加できます。合言葉や番号を受け取っている場合は、それを入力してください。</p>
      <p id="start-error" class="error" aria-live="polite"></p>
      <button id="start-button" class="primary" data-i18n="start">開始</button>
    </section>

    <section id="instruction-screen" class="card screen">
      <p class="eyebrow" data-i18n="instructionsEyebrow">説明</p>
      <h2 data-i18n="instructionsTitle">実験の説明</h2>
      <ul id="instruction-list" class="instruction-list"></ul>
      <button id="begin-button" class="primary" data-i18n="begin">実験を始める</button>
    </section>

    <section id="trial-screen" class="card screen">
      <p id="progress" class="eyebrow"></p>
      <h2 id="question-text"></h2>
      <div id="option-list" class="option-list"></div>
      <div id="text-input-area" class="text-input-area hidden">
        <textarea id="free-text-input" placeholder="Type your message here... / メッセージを入力してください..."></textarea>
        <button id="free-text-submit-button" class="primary">次へ / Next</button>
      </div>
    </section>

    <section id="rating-screen" class="card screen">
      <p id="rating-progress" class="eyebrow"></p>
      <h2 data-i18n="ratingTitle">選択後評価</h2>
      <p class="lead" data-i18n="ratingLead">各項目について1〜7で回答してください。</p>
      <div id="rating-form" class="rating-form"></div>
      <p id="rating-error" class="error" aria-live="polite"></p>
      <button id="next-button" class="primary" data-i18n="next">次へ</button>
    </section>

    <section id="bonus-intro-screen" class="card screen">
      <p class="eyebrow">Bonus</p>
      <h2 data-i18n="bonusTitle">余興質問</h2>
      <p class="lead" data-i18n="bonusLead">ここからはT参加者向けの余興質問です。主分析には使いません。</p>
      <button id="bonus-start-button" class="primary" data-i18n="bonusStart">余興を開始する</button>
    </section>

    <section id="submit-screen" class="card screen">
      <p class="eyebrow" data-i18n="submitEyebrow">送信</p>
      <h2 id="submit-title"></h2>
      <p id="submit-message" class="lead"></p>
      <div id="choice-style" class="choice-style hidden">
        <h3 id="choice-style-heading" data-i18n="choiceStyleHeading">今日のあなたの選択スタイル</h3>
        <p id="choice-style-name" class="choice-style-name"></p>
        <p id="choice-style-desc" class="choice-style-desc"></p>
      </div>
      <div id="fallback-area" class="fallback hidden">
        <textarea id="payload-output" readonly></textarea>
        <div class="button-row">
          <button id="copy-json-button" type="button" data-i18n="copyJson">JSONをコピー</button>
          <button id="download-json-button" type="button" data-i18n="downloadJson">JSONをダウンロード</button>
        </div>
      </div>
    </section>
  </main>

  <script src="config.js?v=claude_fix_1"></script>
  <script src="questions.js?v=claude_fix_1"></script>
  <script src="app.js?v=claude_fix_1"></script>
</body>
</html>
